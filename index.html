<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parcello – Visualisation de parcelles</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link
      href="https://unpkg.com/maplibre-gl@5.19.0/dist/maplibre-gl.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <!-- ── Sidebar ─────────────────────────────────── -->
    <button id="menuToggle" class="btn-toggle" aria-label="Menu">
      <span class="material-symbols-outlined">menu</span>
    </button>
    <div id="sidebarOverlay" class="sidebar-overlay"></div>
    <aside id="sidebar">
      <header class="sidebar-header">
        <img src="/favicon.svg" alt="Parcello logo" class="logo" />
        <h1>Parcello</h1>
      </header>

      <!-- Fond de carte -->
      <section class="panel-section">
        <label class="panel-label">
          <span class="material-symbols-outlined">map</span> Fond de carte
        </label>
        <select id="planetImageSelect" class="select-full" disabled>
          <option value="__osm__">Jawg Street (par défaut)</option>
        </select>
        <p id="planetSearchHint" class="hint" style="margin-top: 0.5rem">
          Glissez un GeoJSON pour rechercher des images satellites récentes.
        </p>
      </section>

      <!-- GeoJSON upload -->
      <section class="panel-section">
        <label class="panel-label">
          <span class="material-symbols-outlined">upload_file</span> Parcelles (GeoJSON)
        </label>
        <div
          id="dropZone"
          class="drop-zone"
          role="button"
          tabindex="0"
          aria-label="Zone de dépôt de fichier GeoJSON"
        >
          <span id="dropLabel"
            ><span class="material-symbols-outlined" style="font-size: 2rem; display: block; margin-bottom: 0.5rem">upload_file</span>Glissez un fichier GeoJSON<br />ou cliquez pour parcourir</span
          >
          <input type="file" id="geojsonFile" accept=".geojson,.json" hidden />
        </div>
        <p id="fileInfo" class="file-info"></p>
      </section>

      <!-- Layer controls -->
      <section class="panel-section" id="layerControls" hidden>
        <label class="panel-label">
          <span class="material-symbols-outlined">layers</span> Couche de parcelles
        </label>
        <div class="toggle-row">
          <label class="toggle-label" for="toggleFill">Remplissage</label>
          <label class="switch">
            <input type="checkbox" id="toggleFill" checked />
            <span class="slider"></span>
          </label>
        </div>
        <div class="toggle-row">
          <label class="toggle-label" for="toggleOutline">Contour</label>
          <label class="switch">
            <input type="checkbox" id="toggleOutline" checked />
            <span class="slider"></span>
          </label>
        </div>
        <div class="toggle-row">
          <label class="toggle-label" for="toggleLabels">Étiquettes</label>
          <label class="switch">
            <input type="checkbox" id="toggleLabels" checked />
            <span class="slider"></span>
          </label>
        </div>

        <label class="panel-label" style="margin-top: 0.75rem"
          >Opacité du remplissage</label
        >
        <input
          type="range"
          id="fillOpacity"
          min="0"
          max="100"
          value="30"
          class="range-full"
        />

        <button
          id="clearLayer"
          class="btn btn-danger"
          style="margin-top: 0.75rem"
        >
          <span class="material-symbols-outlined">delete</span> Supprimer la couche
        </button>
        <button id="zoomToLayer" class="btn btn-secondary">
          <span class="material-symbols-outlined">zoom_in</span> Centrer sur la couche
        </button>
      </section>

      <!-- Feature info -->
      <section class="panel-section" id="featureInfo" hidden>
        <label class="panel-label">
          <span class="material-symbols-outlined">info</span> Propriétés de la parcelle
        </label>
        <div id="featureProps"></div>
      </section>
    </aside>

    <!-- ── Map ─────────────────────────────────────── -->
    <div id="map"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
